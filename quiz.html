<html>
<head>
  <title>Black Joy Verification</title>
  <link rel="stylesheet" type="text/css" href="index.css" />
</head>
<body>

<h2>Answer to enter ✨</h2>

<form id="quizForm">

    <!-- Q1 -->
    <div id="q1Container">
        <p>Who is your mom NOT?</p>
        <input type="text" id="q1" placeholder="Type your answer">
    </div>

    <!-- Q2 (HIDDEN) -->
    <div id="q2Container" style="display: none;">
        <p>What does WWGITSDTNDLANDAFN mean?</p>
        <input type="text" id="q2" placeholder="Type your answer">
    </div>

    <br><br>
    <button type="button" onclick="checkAnswers()">Submit</button>
</form>

<script>
function checkAnswers() {
    let q1 = document.getElementById("q1").value.toLowerCase().trim();
    let q2 = document.getElementById("q2").value.toLowerCase().trim();

    let validQ1 = ["your lil friend", "booboo the fool"];
    let correctQ2 = "when we go in this store don't touch nothing don't look at nothing don't ask for nothing";

    // Step 1: Check Q1
    if (document.getElementById("q2Container").style.display === "none") {

        if (validQ1.includes(q1)) {
            localStorage.setItem("verified", "true");
            window.location.href = "loginsignup.html";
        } else {
            alert("Mmmmm one more try 👀");

            // hide Q1
            document.getElementById("q1Container").style.display = "none";

            // show Q2
            document.getElementById("q2Container").style.display = "block";
        }

    } 
    // Step 2: Now check Q2
    else {
        if (q2 === correctQ2) {
            localStorage.setItem("verified", "true");
            window.location.href = "loginsignup.html";
        } else {
            alert("Guess you gotta hate from outside the club 😭");
        }
    }
}
</script>

</body>
</html>
