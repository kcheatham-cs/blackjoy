<html>
    <head>
      <title>Black Joy App</title>
       <!-- Load CSS file here -->
       <link rel=" stylesheet" type="text/css" href="index.css" />

    </head>

    <body onload="checkVerification()"> 
        <script src="app.js"></script>

         <!-- signup hidden -->
    <form id="signupForm" style="display: none;">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button type="button" onclick="signUp()">Sign Up</button>
    </form>

    <!-- login (hidden) -->
    <form id="loginForm">
        <input type="email" id="logUser" placeholder="Email">
        <input type="password" id="logPass" placeholder="Password">
        <button type="button" onclick="window.location.href='openforum.html'">Sign Up</button>
    </form>
    
<div id="content"></div>
</body> 
</html>
