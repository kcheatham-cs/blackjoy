<!DOCTYPE html>
<html>
<head>
    <title>Black Joy App</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Load CSS file here -->
    <link rel=" stylesheet" type="text/css" href="index.css" />

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0f0f0f;
            color: white;
        }

        header {
            text-align: center;
            padding: 20px;
            background: black;
            border-bottom: 2px solid gold;
        }

        header h1 {
            margin: 0;
            color: gold;
        }

        #forum {
            max-width: 500px;
            margin: 20px auto;
            padding: 15px;
        }

        #postBox {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #vibesInput {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        button {
            background: gold;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: orange;
        }

        .post {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 0 10px rgba(255,215,0,0.2);
        }

        .post p {
            margin: 0 0 10px;
        }

        .likeBtn {
            background: transparent;
            color: gold;
            border: 1px solid gold;
            padding: 5px 10px;
            border-radius: 8px;
        }

        .likeBtn:hover {
            background: gold;
            color: black;
        }

        small {
            color: gray;
        }
    </style>
</head>

<body>

<header>
    <h1>Black Joy</h1>
    <p>For Us. By Us.</p>
</header>

<div id="forum">

    <div id="postBox">
        <input id="Input" placeholder="What's Da Vibes?" />
        <button onclick="addPost()">Post</button>
    </div>

    <div id="Feed"></div>
git
</div>

<script type="module" src="app.js"></script>

</body>
</html>
